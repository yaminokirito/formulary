function esc(str){
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

}

}

async function firestoreGetAll(collectionName){
  if (!useFirestore) return null;
  try {
    const snapshot = await firestoreDb.collection(collectionName).get();
    const arr = [];
    snapshot.forEach(doc => arr.push(Object.assign({ id: doc.id }, doc.data())));
    return arr;
  } catch(e){ console.error(e); return null; }
}

async function firestoreSetAll(collectionName, items){
  if (!useFirestore) return false;
  try {
    // Read current documents so we can delete any that were removed locally
    const snapshot = await firestoreDb.collection(collectionName).get();
    const existingIds = [];
    snapshot.forEach(doc => existingIds.push(doc.id));

    const batch = firestoreDb.batch();
    const newIds = items.map(it => it.id);
    items.forEach(item => {
      const ref = firestoreDb.collection(collectionName).doc(item.id);
      batch.set(ref, item);
    });

    // Delete docs that exist remotely but are no longer present locally
    existingIds.forEach(id => {
      if (!newIds.includes(id)){
        const ref = firestoreDb.collection(collectionName).doc(id);
        batch.delete(ref);
      }
    });

    await batch.commit();
    return true;
  } catch(e){ console.error(e); return false; }
}

async function safeGet(key, shared){
  // Try Firestore for known keys first
  try {
    if (useFirestore){
      if (key === 'medicines'){
        const arr = await firestoreGetAll('medicines');
        return arr ? JSON.stringify(arr) : null;
      }
      if (key === 'requests'){
        const arr = await firestoreGetAll('requests');
        return arr ? JSON.stringify(arr) : null;
      }
      if (key === 'profile-name' || key === 'onboarding-dismissed'){
        const doc = await firestoreDb.collection('meta').doc(key).get();
        if (doc.exists) return doc.data().value;
      }
    }
  } catch(e){ console.error('Firestore read error', e); disableFirestore(); }

  // Fallback to existing window.storage if available
  try {
    if (window.storage && window.storage.get) {
      const res = await window.storage.get(key, shared);
      return res ? res.value : null;
    }
  } catch(e){}
  // Fallback to localStorage for browsers when other providers unavailable
  try {
    const v = localStorage.getItem(key);
    return v !== null ? v : null;
  } catch(e){ console.error('localStorage read error', e); }
  return null;
}

async function safeSet(key, value, shared){
  // Try writing to Firestore when enabled
  try {
    if (useFirestore){
      if (key === 'medicines'){
        const ok = await firestoreSetAll('medicines', JSON.parse(value));
        if (ok){
          await firestoreDb.collection('meta').doc('medicines-updated').set({ts: Date.now()});
          return true;
        }
        disableFirestore();
      }
      if (key === 'requests'){
        const ok = await firestoreSetAll('requests', JSON.parse(value));
        if (ok){
          await firestoreDb.collection('meta').doc('requests-updated').set({ts: Date.now()});
          return true;
        }
        disableFirestore();
      }
      if (key === 'profile-name' || key === 'onboarding-dismissed'){
        try {
          await firestoreDb.collection('meta').doc(key).set({value: value});
          return true;
        } catch(e){ console.error('Firestore write error', e); disableFirestore(); }
      }
    }
  } catch(e){ console.error('Firestore write error', e); disableFirestore(); }

  try {
    if (window.storage && window.storage.set) {
      const res = await window.storage.set(key, value, shared);
      return !!res;
    }
  } catch(e){}
  // Fallback to localStorage for browsers when other providers unavailable
  try {
    localStorage.setItem(key, value);
    console.log('Saved to localStorage fallback:', key);
    return true;
  } catch(e){ console.error('localStorage write error', e); }
  return false;
}

/* ============================== IMAGE RESIZE ============================== */
function resizeImage(file, maxDim, quality){
  maxDim = maxDim || 500; quality = quality || 0.75;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim){ height = Math.round(height * (maxDim / width)); width = maxDim; }
        else if (height >= width && height > maxDim){ width = Math.round(width * (maxDim / height)); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============================== TOAST ============================== */
function showToast(message, type){
  type = type || 'success';
  const root = document.getElementById('toast-root');
  const colors = { success: 'bg-primary', error: 'bg-danger', info: 'bg-ink' };
  const el = document.createElement('div');
  el.className = `toast ${colors[type]} text-white text-sm font-medium px-4 py-2.5 rounded-lg shadow-lg flex items-center gap-2 max-w-xs`;
  el.innerHTML = `${type==='success'?icon('check',15):type==='error'?icon('alert',15):icon('bell',15)}<span>${esc(message)}</span>`;
  root.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .25s'; setTimeout(() => el.remove(), 250); }, 3200);
}

/* ============================== MODAL ============================== */
function openModal(html){
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="fixed inset-0 modal-overlay z-[60] flex items-center justify-center p-4" data-action="overlay-close">
      <div class="modal-card modal-anim bg-surface rounded-xl2 shadow-2xl w-full max-w-lg" data-stop>
        ${html}
      </div>
    </div>`;
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  document.getElementById('modal-root').innerHTML = '';
  document.body.style.overflow = '';
  pendingPhotoData = null;
  pendingConfirmAction = null;
}

function modalHeader(title){
  return `
    <div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-line">
      <h3 class="font-display font-semibold text-lg">${esc(title)}</h3>
      <button data-action="close-modal" class="icon-btn !bg-transparent hover:!bg-paper" aria-label="Close">${icon('x',18)}</button>

}

/* ============================== SMALL RENDER PIECES ============================== */
function placeholderTile(medicine, size){
  size = size || 40;
  const tint = categoryTint(medicine.category || 'Other');
  const initial = (medicine.name || '?').trim().charAt(0).toUpperCase();
  return `<div class="flex-none rounded-md flex items-center justify-center text-white font-display font-semibold" style="width:${size}px;height:${size}px;background:linear-gradient(135deg, ${tint}, ${tint}cc);font-size:${Math.round(size*0.4)}px">${initial}</div>`;
}

function stampHTML(kind, key){
  const meta = kind === 'stock' ? STOCK_META[key] : REQ_META[key];
  return `<span class="stamp ${meta.text} ${meta.bg}"><span class="dot"></span>${esc(meta.label)}</span>`;
}

function stockMeterHTML(m){
  const status = getStockStatus(m);
  const meta = STOCK_META[status];
  const pct = stockFillPct(m);
  return `
    <div>
      <div class="flex items-center justify-between mb-1.5">
        <span class="font-mono text-xs font-semibold">${m.stock} <span class="text-inksoft font-normal">${esc(m.unit)}</span></span>
        ${stampHTML('stock', status)}
      </div>
      <div class="vial"><div class="vial-fill" style="width:${pct}%;background:${meta.fill}"></div></div>
    </div>`;
}

function medicineCardHTML(m, isAdmin){
  const status = getStockStatus(m);
  const photoBlock = m.photo
    ? `<img src="${m.photo}" class="w-full h-36 object-cover">`
    : `<div class="w-full h-36 flex items-center justify-center" style="background:linear-gradient(135deg, ${categoryTint(m.category)}22, ${categoryTint(m.category)}0d)">${placeholderTile(m, 56)}</div>`;

  const adminControls = isAdmin ? `
    <div class="absolute top-2 right-2 flex gap-1.5">
      <button data-action="edit-medicine" data-id="${m.id}" class="icon-btn" aria-label="Edit ${esc(m.name)}">${icon('edit',15)}</button>
      <button data-action="delete-medicine" data-id="${m.id}" class="icon-btn hover:!text-danger" aria-label="Delete ${esc(m.name)}">${icon('trash',15)}</button>
    </div>` : '';

  const footer = isAdmin
    ? `<p class="text-[11px] text-inksoft font-mono">${esc(m.batch)}</p>`
    : `<button data-action="open-request" data-id="${m.id}" ${status==='out' ? 'disabled' : ''} class="btn-primary w-full !py-2 !text-xs">${status==='out' ? 'Out of stock' : 'Request'}</button>`;

  return `
    <div class="bg-surface border border-line rounded-xl2 overflow-hidden flex flex-col shadow-sm">
      <div class="relative">
        ${photoBlock}
        ${adminControls}
      </div>
      <div class="ticket-line"></div>
      <div class="p-4 flex flex-col gap-3 flex-1">
        <div>
          <p class="text-[11px] font-mono text-inksoft uppercase tracking-wide">${esc(m.category)}</p>
          <h4 class="font-display font-semibold text-[15px] leading-snug mt-0.5">${esc(m.name)}</h4>
          <p class="text-xs text-inksoft mt-1 clamp-2">${esc(m.description) || 'No description added.'}</p>
        </div>
        ${stockMeterHTML(m)}
        <div class="mt-auto pt-1">${footer}</div>
      </div>
    </div>`;
}

function emptyStateHTML(iconName, title, body){
  return `
    <div class="col-span-full flex flex-col items-center justify-center text-center py-16 px-4">
      <div class="w-12 h-12 rounded-full bg-primarysoft text-primary flex items-center justify-center mb-3">${icon(iconName, 22)}</div>
      <p class="font-display font-semibold text-base">${esc(title)}</p>
      <p class="text-sm text-inksoft mt-1 max-w-xs">${esc(body)}</p>
    </div>`;
}

function requestRowHTML(r, mode){
  const m = findMedicine(r.medicineId);
  const canApprove = r.status === 'pending';
  const canFulfill = r.status === 'approved';
  const canReject = r.status === 'pending' || r.status === 'approved';
  const canCancel = mode === 'mine' && r.status === 'pending';

  let actions = '';
  if (mode === 'admin'){
    const btns = [];
    if (canApprove) btns.push(`<button data-action="approve-request" data-id="${r.id}" class="btn-primary !py-1.5 !px-3 !text-xs">Approve</button>`);
    if (canFulfill) btns.push(`<button data-action="fulfill-request" data-id="${r.id}" class="btn-primary !py-1.5 !px-3 !text-xs">Mark fulfilled</button>`);
    if (canReject) btns.push(`<button data-action="reject-request" data-id="${r.id}" class="btn-secondary !py-1.5 !px-3 !text-xs hover:!text-danger">Reject</button>`);
    actions = btns.join('');
  } else if (canCancel){
    actions = `<button data-action="cancel-request" data-id="${r.id}" class="btn-secondary !py-1.5 !px-3 !text-xs hover:!text-danger">Cancel</button>`;
  }

  return `
    <div class="flex items-center gap-4 bg-surface border border-line rounded-xl2 p-3.5">
      ${m && m.photo ? `<img src="${m.photo}" class="w-12 h-12 rounded-lg object-cover flex-none">` : placeholderTile(m || {name:r.medicineName, category:'Other'}, 48)}
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          <p class="font-semibold text-sm truncate">${esc(r.medicineName)}</p>
          ${stampHTML('req', r.status)}
        </div>
        <p class="text-xs text-inksoft mt-0.5">
          <span class="font-mono">${r.quantity} ${esc(r.medicineUnit)}</span>
          ${mode==='admin' ? ` · requested by ${esc(r.requesterName)}` : ''}
          · ${formatDate(r.createdAt)}
        </p>
        ${r.notes ? `<p class="text-xs text-inksoft mt-1 italic">"${esc(r.notes)}"</p>` : ''}
        ${r.reason ? `<p class="text-xs text-danger mt-1">Reason: ${esc(r.reason)}</p>` : ''}
      </div>
      <div class="flex-none flex gap-1.5 flex-wrap justify-end">${actions}</div>
    </div>`;
}

function statCardHTML(label, value, iconName, accent){
  return `
    <div class="bg-surface border border-line rounded-xl2 p-4 ${accent ? 'border-l-[3px]' : ''}" ${accent ? `style="border-left-color:${accent}"` : ''}>
      <div class="flex items-center justify-between mb-2">
        <span class="text-inksoft">${icon(iconName, 16)}</span>
      </div>
      <p class="font-display font-semibold text-2xl leading-none">${value}</p>
      <p class="text-xs text-inksoft mt-1.5">${esc(label)}</p>
    </div>`;
}

/* ============================== TAB CONTENT BUILDERS ============================== */
function filteredMedicines(){
  const q = state.search.trim().toLowerCase();
  return state.medicines.filter(m => {
    const matchesQ = !q || m.name.toLowerCase().includes(q) || m.category.toLowerCase().includes(q);
    const matchesCat = state.category === 'All' || m.category === state.category;
    return matchesQ && matchesCat;
  });
}
function filteredRequests(mode){
  const q = state.search.trim().toLowerCase();
  return state.requests
    .filter(r => mode === 'mine' ? r.requesterName.trim().toLowerCase() === state.userName.trim().toLowerCase() : true)
    .filter(r => state.reqStatusFilter === 'All' || r.status === state.reqStatusFilter)
    .filter(r => !q || r.medicineName.toLowerCase().includes(q) || r.requesterName.toLowerCase().includes(q))
    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
}

function categoryChipsHTML(){
  const cats = ['All', ...CATEGORIES];
  return cats.map(c => `<button data-action="set-category" data-category="${esc(c)}" class="chip ${state.category===c?'active':''}">${esc(c)}</button>`).join('');
}
function statusChipsHTML(){
  const statuses = ['All','pending','approved','fulfilled','rejected','cancelled'];
  return statuses.map(s => `<button data-action="set-status-filter" data-status="${s}" class="chip ${state.reqStatusFilter===s?'active':''}">${s==='All'?'All':esc(REQ_META[s].label)}</button>`).join('');
}

function adminInventoryHTML(){
  const meds = state.medicines;
  const totalStock = meds.reduce((s,m)=>s+m.stock,0);
  const lowCount = meds.filter(m=>getStockStatus(m)==='low').length;
  const outCount = meds.filter(m=>getStockStatus(m)==='out').length;
  return `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      ${statCardHTML('Medicines listed', meds.length, 'layers')}
      ${statCardHTML('Units in stock', totalStock, 'box')}
      ${statCardHTML('Low stock', lowCount, 'alert', lowCount ? '#C97A2B' : null)}
      ${statCardHTML('Out of stock', outCount, 'slash', outCount ? '#B23B3B' : null)}
    </div>
    <div class="flex items-center gap-3 flex-wrap justify-between mb-4">
      <div class="relative flex-1 min-w-[200px] max-w-sm">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-inksoft">${icon('search',15)}</span>
        <input id="search-input" class="field-input !pl-9" placeholder="Search medicines…" aria-label="Search medicines" value="${esc(state.search)}">
      </div>
      <button data-action="open-add-medicine" class="btn-primary inline-flex items-center gap-1.5">${icon('plus',15)} Add medicine</button>
    </div>
    <div class="flex gap-2 flex-wrap mb-5">${categoryChipsHTML()}</div>
    <div id="inventory-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
  `;
}
function updateInventoryGrid(){
  const el = document.getElementById('inventory-grid');
  if (!el) return;
  const list = filteredMedicines();
  el.innerHTML = list.length
    ? list.map(m => medicineCardHTML(m, true)).join('')
    : emptyStateHTML('box', state.medicines.length ? 'No matches' : 'Nothing in the formulary yet', state.medicines.length ? 'Try a different search or category.' : 'Add the first medicine to get started.');
}

function adminRequestsHTML(){
  return `
    <div class="flex items-center gap-3 flex-wrap justify-between mb-4">
      <div class="relative flex-1 min-w-[200px] max-w-sm">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-inksoft">${icon('search',15)}</span>
        <input id="search-input" class="field-input !pl-9" placeholder="Search by medicine or requester…" aria-label="Search requests" value="${esc(state.search)}">
      </div>
    </div>
    <div class="flex gap-2 flex-wrap mb-5">${statusChipsHTML()}</div>
    <div id="requests-list" class="flex flex-col gap-3"></div>
  `;
}
function updateRequestsList(){
  const el = document.getElementById('requests-list');
  if (!el) return;
  const list = filteredRequests('all');
  el.innerHTML = list.length
    ? list.map(r => requestRowHTML(r, 'admin')).join('')
    : `<div>${emptyStateHTML('inbox', 'No requests waiting', 'New requests from users will show up here.')}</div>`;
}

function userBrowseHTML(){
  return `
    <div class="flex items-center gap-3 flex-wrap mb-4">
      <div class="relative flex-1 min-w-[200px] max-w-sm">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-inksoft">${icon('search',15)}</span>
        <input id="search-input" class="field-input !pl-9" placeholder="Search medicines…" aria-label="Search medicines" value="${esc(state.search)}">
      </div>
    </div>
    <div class="flex gap-2 flex-wrap mb-5">${categoryChipsHTML()}</div>
    <div id="browse-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
  `;
}
function updateBrowseGrid(){
  const el = document.getElementById('browse-grid');
  if (!el) return;
  const list = filteredMedicines();
  el.innerHTML = list.length
    ? list.map(m => medicineCardHTML(m, false)).join('')
    : emptyStateHTML('search', 'No medicines match', 'Try a different search or category.');
}

function userMyRequestsHTML(){
  return `
    <div id="my-requests-list" class="flex flex-col gap-3"></div>
  `;
}
function updateMyRequestsList(){
  const el = document.getElementById('my-requests-list');
  if (!el) return;
  const list = filteredRequests('mine');
  el.innerHTML = list.length
    ? list.map(r => requestRowHTML(r, 'mine')).join('')
    : `<div>${emptyStateHTML('inbox', 'No requests yet', 'Browse the formulary and request something to see it tracked here.')}</div>`;
}

/* ============================== SHELL / APP RENDER ============================== */
function tabsForRole(){
  const pendingCount = state.requests.filter(r=>r.status==='pending').length;
  if (state.role === 'admin'){
    return [
      { key: 'inventory', label: 'Inventory' },
      { key: 'requests', label: `Requests${pendingCount ? ` (${pendingCount})` : ''}` },
    ];
  }
  return [
    { key: 'browse', label: 'Browse' },
    { key: 'mine', label: 'My requests' },
  ];
}

function onboardingBannerHTML(){
  if (state.onboardingDismissed) return '';
  return `
    <div class="bg-primarysoft border border-primary/20 rounded-xl2 px-4 py-3 mb-6 flex items-start gap-3">
      <span class="text-primary mt-0.5 flex-none">${icon('bell',16)}</span>
      <p class="text-xs text-ink/80 flex-1">This inventory is shared — changes made here are visible to everyone using this app. Use the switch above to view it as an admin or as a user.</p>
      <button data-action="dismiss-onboarding" class="text-primary flex-none" aria-label="Dismiss">${icon('x',15)}</button>
    </div>`;
}

function renderApp(){
  const tabs = tabsForRole();
  if (!tabs.find(t => t.key === state.tab)) state.tab = tabs[0].key;
  const pendingCount = state.requests.filter(r=>r.status==='pending').length;

  document.getElementById('app').innerHTML = `
    <header class="border-b border-line bg-surface/90 backdrop-blur sticky top-0 z-30">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4 flex-wrap">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-primary text-white flex items-center justify-center flex-none">${icon('logo',19)}</div>
          <div>
            <h1 class="font-display font-semibold text-lg leading-none">Formulary</h1>
            <p class="text-[11px] text-inksoft mt-1 hidden sm:block">Know what's in stock, always.</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          ${state.role==='admin' && pendingCount ? `<span class="hidden sm:inline-flex items-center gap-1.5 text-xs font-medium text-amber bg-ambersoft px-2.5 py-1.5 rounded-full">${icon('bell',13)} ${pendingCount} pending</span>` : ''}
          <div class="flex items-center bg-paper border border-line rounded-full p-1">
            <button data-action="set-role" data-role="user" class="role-btn ${state.role==='user'?'active':''}">User</button>
            <button data-action="set-role" data-role="admin" class="role-btn ${state.role==='admin'?'active':''}">Admin</button>
          </div>
        </div>
      </div>
      <nav class="max-w-7xl mx-auto px-4 sm:px-6 flex gap-5">
        ${tabs.map(t => `<button data-action="set-tab" data-tab="${t.key}" class="tab-btn ${state.tab===t.key?'active':''}">${t.label}</button>`).join('')}
      </nav>
    </header>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
      ${onboardingBannerHTML()}
      <div id="tab-content"></div>
    </main>
  `;

  const content = document.getElementById('tab-content');
  if (state.role === 'admin' && state.tab === 'inventory'){ content.innerHTML = adminInventoryHTML(); updateInventoryGrid(); }
  else if (state.role === 'admin' && state.tab === 'requests'){ content.innerHTML = adminRequestsHTML(); updateRequestsList(); }
  else if (state.role === 'user' && state.tab === 'browse'){ content.innerHTML = userBrowseHTML(); updateBrowseGrid(); }
  else if (state.role === 'user' && state.tab === 'mine'){ content.innerHTML = userMyRequestsHTML(); updateMyRequestsList(); }

  focusSearchIfNeeded();
}

function refreshCurrentList(){
  if (state.role === 'admin' && state.tab === 'inventory') updateInventoryGrid();
  else if (state.role === 'admin' && state.tab === 'requests') updateRequestsList();
  else if (state.role === 'user' && state.tab === 'browse') updateBrowseGrid();
  else if (state.role === 'user' && state.tab === 'mine') updateMyRequestsList();
}

let _refocusSearch = false;
function focusSearchIfNeeded(){
  if (_refocusSearch){
    const input = document.getElementById('search-input');
    if (input){ input.focus(); const v = input.value; input.value=''; input.value=v; }
    _refocusSearch = false;
  }
}

function renderLoading(){
  document.getElementById('app').innerHTML = `
    <div class="min-h-screen flex flex-col items-center justify-center gap-3">
      <div class="w-10 h-10 rounded-lg bg-primary text-white flex items-center justify-center animate-pulse">${icon('logo',20)}</div>
      <p class="text-sm text-inksoft">Loading formulary…</p>
    </div>`;
}

/* ============================== EVENT HANDLERS ============================== */
function handleAppClick(e){
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'set-role'){
    state.role = btn.dataset.role;
    state.tab = state.role === 'admin' ? 'inventory' : 'browse';
    state.search = ''; state.category = 'All'; state.reqStatusFilter = 'All';
    renderApp();
  } else if (action === 'set-tab'){
    state.tab = btn.dataset.tab;
    state.search = '';
    renderApp();
  } else if (action === 'set-category'){
    state.category = btn.dataset.category;
    document.querySelectorAll('.chip[data-action="set-category"]').forEach(c => c.classList.toggle('active', c.dataset.category === state.category));
    refreshCurrentList();
  } else if (action === 'set-status-filter'){
    state.reqStatusFilter = btn.dataset.status;
    document.querySelectorAll('.chip[data-action="set-status-filter"]').forEach(c => c.classList.toggle('active', c.dataset.status === state.reqStatusFilter));
    refreshCurrentList();
  } else if (action === 'open-add-medicine'){
    openMedicineForm(null);
  } else if (action === 'edit-medicine'){
    openMedicineForm(findMedicine(btn.dataset.id));
  } else if (action === 'delete-medicine'){
    const m = findMedicine(btn.dataset.id);
    if (!m) return;
    openConfirm({
      title: 'Delete medicine',
      body: `Remove "${m.name}" from the formulary? This can't be undone.`,
      confirmLabel: 'Delete',
      danger: true,
      onConfirm: async () => {
        state.medicines = state.medicines.filter(x => x.id !== m.id);
        await saveMedicines();
        refreshCurrentList();
        renderApp();
        showToast('Medicine deleted');
      }
    });
  } else if (action === 'open-request'){
    const m = findMedicine(btn.dataset.id);
    if (m) openRequestForm(m);
  } else if (action === 'approve-request'){
    handleApprove(btn.dataset.id);
  } else if (action === 'fulfill-request'){
    handleFulfill(btn.dataset.id);
  } else if (action === 'reject-request'){
    const r = findRequest(btn.dataset.id);
    if (r) openRejectForm(r);
  } else if (action === 'cancel-request'){
    const r = findRequest(btn.dataset.id);
    if (!r) return;
    openConfirm({
      title: 'Cancel request',
      body: `Cancel your request for ${r.quantity} ${r.medicineUnit} of ${r.medicineName}?`,
      confirmLabel: 'Cancel request',
      danger: true,
      onConfirm: async () => {
        r.status = 'cancelled';
        await saveRequests();
        refreshCurrentList();
        renderApp();
        showToast('Request cancelled');
      }
    });
  } else if (action === 'dismiss-onboarding'){
    dismissOnboarding();
    const banner = btn.closest('.bg-primarysoft');
    if (banner) banner.remove();
  }
}

function handleAppInput(e){
  if (e.target.id === 'search-input'){
    state.search = e.target.value;
    _refocusSearch = true;
    refreshCurrentList();
    focusSearchIfNeeded();
  }
}

async function handleApprove(id){
  const r = findRequest(id);
  if (!r) return;
  const m = findMedicine(r.medicineId);
  if (m && r.quantity > m.stock){
    showToast(`Only ${m.stock} ${m.unit} available — restock or reject instead`, 'error');
    return;
  }
  r.status = 'approved';
  await saveRequests();
  refreshCurrentList();
  renderApp();
  showToast('Request approved');
}

async function handleFulfill(id){
  const r = findRequest(id);
  if (!r) return;
  const m = findMedicine(r.medicineId);
  if (!m){ showToast('Medicine no longer exists', 'error'); return; }
  if (r.quantity > m.stock){
    showToast(`Not enough stock to fulfill — ${m.stock} ${m.unit} available`, 'error');
    return;
  }
  m.stock -= r.quantity;
  r.status = 'fulfilled';
  r.fulfilledAt = new Date().toISOString();
  await Promise.all([saveMedicines(), saveRequests()]);
  refreshCurrentList();
  renderApp();
  showToast('Request marked as fulfilled');
}

/* ---- Modal-scoped events ---- */
function handleModalClick(e){
  const overlay = e.target.closest('[data-action="overlay-close"]');
  if (overlay && !e.target.closest('[data-stop]')){ closeModal(); return; }

  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'close-modal'){
    closeModal();
  } else if (action === 'confirm-action'){
    const fn = pendingConfirmAction;
    closeModal();
    if (fn) fn();
  } else if (action === 'remove-photo'){
    pendingPhotoData = null;
    const wrap = document.getElementById('mf-preview-wrap');
    if (wrap) wrap.classList.add('hidden');
    btn.classList.add('hidden');
    const fileInput = document.getElementById('mf-photo');
    if (fileInput) fileInput.value = '';
  }
}

async function handleModalChange(e){
  if (e.target.id === 'mf-photo' && e.target.files && e.target.files[0]){
    const file = e.target.files[0];
    if (!file.type.startsWith('image/')){ showToast('Please choose an image file', 'error'); return; }
    try {
      const dataUrl = await resizeImage(file);
      pendingPhotoData = dataUrl;
      const wrap = document.getElementById('mf-preview-wrap');
      const img = document.getElementById('mf-preview');
      const removeBtn = document.getElementById('mf-remove-photo');
      if (img) img.src = dataUrl;
      if (wrap) wrap.classList.remove('hidden');
      if (removeBtn) removeBtn.classList.remove('hidden');
    } catch(err){
      showToast('Could not process that image', 'error');
    }
  }
}

async function handleModalSubmit(e){
  e.preventDefault();
  const form = e.target;

  if (form.id === 'medicine-form'){
    const id = form.querySelector('[name=id]').value;
    const name = form.querySelector('[name=name]').value.trim();
    const category = form.querySelector('[name=category]').value;
    const description = form.querySelector('[name=description]').value.trim();
    const unit = form.querySelector('[name=unit]').value.trim() || 'units';
    const stockRaw = form.querySelector('[name=stock]').value;
    const thresholdRaw = form.querySelector('[name=threshold]').value;
    const stock = parseInt(stockRaw, 10);
    const threshold = thresholdRaw === '' ? 10 : parseInt(thresholdRaw, 10);

    if (!name){ showToast('Medicine name is required', 'error'); return; }
    if (isNaN(stock) || stock < 0){ showToast('Enter a valid stock quantity', 'error'); return; }

    if (id){
      const m = findMedicine(id);
      if (m){
        Object.assign(m, { name, category, description, unit, stock, threshold: isNaN(threshold)?10:threshold, photo: pendingPhotoData });
      }
      await saveMedicines();
      closeModal();
      refreshCurrentList();
      renderApp();
      showToast('Medicine updated');
    } else {
      const m = {
        id: generateId(),
        batch: form.querySelector('[name=batch]').value || batchCode(),
        name, category, description, unit, stock,
        threshold: isNaN(threshold)?10:threshold,
        photo: pendingPhotoData,
        createdAt: new Date().toISOString(),
      };
      state.medicines.unshift(m);
      await saveMedicines();
      closeModal();
      refreshCurrentList();
      renderApp();
      showToast('Medicine added');
    }
  }

  else if (form.id === 'request-form'){
    const medicineId = form.querySelector('[name=medicineId]').value;
    const requesterName = form.querySelector('[name=requesterName]').value.trim();
    const quantity = parseInt(form.querySelector('[name=quantity]').value, 10);
    const notes = form.querySelector('[name=notes]').value.trim();
    const m = findMedicine(medicineId);

    if (!requesterName){ showToast('Please enter your name', 'error'); return; }
    if (!m){ showToast('This medicine is no longer available', 'error'); closeModal(); return; }
    if (isNaN(quantity) || quantity < 1){ showToast('Enter a valid quantity', 'error'); return; }
    if (quantity > m.stock){ showToast(`Only ${m.stock} ${m.unit} available`, 'error'); return; }

    const r = {
      id: generateId(),
      medicineId: m.id,
      medicineName: m.name,
      medicineUnit: m.unit,
      requesterName,
      quantity,
      notes,
      status: 'pending',
      createdAt: new Date().toISOString(),
    };
    state.requests.unshift(r);
    await saveRequests();
    await saveProfileName(requesterName);
    closeModal();
    refreshCurrentList();
    renderApp();
    showToast('Request submitted');
  }

  else if (form.id === 'reject-form'){
    const requestId = form.querySelector('[name=requestId]').value;
    const reason = form.querySelector('[name=reason]').value.trim();
    const r = findRequest(requestId);
    if (r){
      r.status = 'rejected';
      if (reason) r.reason = reason;
      await saveRequests();
      closeModal();
      refreshCurrentList();
      renderApp();
      showToast('Request rejected');
    }
  }
}

/* ============================== INIT ============================== */
function bindGlobalEvents(){
  document.getElementById('app').addEventListener('click', handleAppClick);
  document.getElementById('app').addEventListener('input', handleAppInput);
  const modalRoot = document.getElementById('modal-root');
  modalRoot.addEventListener('click', handleModalClick);
  modalRoot.addEventListener('submit', handleModalSubmit);
  modalRoot.addEventListener('change', handleModalChange);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
}

(async function init(){
  renderLoading();
  try {
    await Promise.all([loadMedicines(), loadRequests(), loadProfile()]);
  } catch(e){
    console.error('App init error', e);
  }
  bindGlobalEvents();
  renderApp();
})();
</script>
</body>
